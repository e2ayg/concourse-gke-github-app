name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# NOTE: GitHub Actions are pinned to full commit SHAs (supply-chain hardening).
# The trailing comment records the human-readable version; Dependabot updates both.
jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.14.0"
      - name: terraform fmt -check
        run: terraform fmt -check -recursive

  validate:
    name: terraform validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        dir:
          - modules/concourse-gke-github-app
          - examples/basic
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.14.0"
      - name: terraform init
        run: terraform init -backend=false -input=false
        working-directory: ${{ matrix.dir }}
      - name: terraform validate
        run: terraform validate
        working-directory: ${{ matrix.dir }}

  tflint:
    name: tflint (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
        with:
          tflint_version: latest
      - name: tflint --init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: tflint
        continue-on-error: true
        run: tflint --recursive -f compact

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: actionlint
        uses: docker://rhysd/actionlint@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9 # 1.7.7
        with:
          args: -color

  docker-build:
    name: token-refresher image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Builds the image (base + pinned Python deps via uv) so Dependabot
      # bumps to requirements.txt / the base image are actually validated.
      - name: Build image
        run: docker build -t concourse-token-refresher:ci token-refresher
      - name: Import smoke test
        run: |
          docker run --rm --entrypoint python concourse-token-refresher:ci \
            -c "import refresh_token; print('import ok')"
