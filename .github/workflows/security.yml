name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

# NOTE: Actions are pinned to full commit SHAs (supply-chain hardening); the
# trailing comment records the version. Dependabot keeps SHAs + comments updated.
jobs:
  checkov:
    name: checkov (SARIF)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true # advisory: never blocks the workflow
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Checkov
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12
        with:
          directory: .
          config_file: .checkov.yaml
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: true
      # SARIF upload needs security-events:write, which fork/Dependabot PRs do
      # not get; only upload from pushes to the repo.
      - name: Upload SARIF
        if: always() && github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: results.sarif
          category: checkov

  trivy:
    name: trivy (SARIF)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true # advisory: never blocks the workflow
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy.sarif
          exit-code: "0"
      - name: Upload SARIF
        if: always() && github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: trivy.sarif
          category: trivy

  gitleaks:
    name: gitleaks (secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  bandit:
    name: bandit (python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Bandit
        run: uvx --from "bandit[toml]" bandit -c pyproject.toml -r token-refresher
