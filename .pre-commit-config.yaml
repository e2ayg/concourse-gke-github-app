# Pre-commit hooks — https://pre-commit.com
#
#   pip install pre-commit          # or: brew install pre-commit
#   pre-commit install              # install git hook
#   pre-commit run --all-files      # run everything now
#   pre-commit autoupdate           # refresh 'rev' pins to latest
#
# External tools these hooks need on PATH (or via their pinned repos):
#   terraform, tflint, checkov, trivy, gitleaks, shfmt, shellcheck, hadolint (docker)
minimum_pre_commit_version: "3.5.0"
fail_fast: false

repos:
  # ---- generic hygiene ------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ---- Terraform: fmt / validate / docs / tflint / checkov / trivy ----------
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.4
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
      - id: terraform_checkov
        args:
          - --args=--config-file __GIT_WORKING_DIR__/.checkov.yaml
      - id: terraform_trivy
        args:
          - --args=--config __GIT_WORKING_DIR__/trivy.yaml

  # ---- secrets --------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ---- Python (token refresher) --------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  # ---- shell scripts --------------------------------------------------------
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-1
    hooks:
      - id: shfmt
        args: [-i, "2", -ci, -sr, -w]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # ---- Dockerfile -----------------------------------------------------------
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: [--config, .hadolint.yaml]

  # ---- GitHub Actions workflows --------------------------------------------
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
